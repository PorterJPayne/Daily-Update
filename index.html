<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kiln Tech Daily Update Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --cream:#f6f1ea;
  --sage:#7f9071;
  --light-sage:#dfe5d8;
  --brown:#b47c4d;
  --text:#2d2926;
  --muted:#7d746c;
  --line:#ddd4ca;
}

body{
  background:var(--cream);
  color:var(--text);
  font-family:'Inter',sans-serif;
}

.serif{
  font-family:'Cormorant Garamond',serif;
}

input,
textarea,
select{
  transition:all .2s ease;
}

input:focus,
textarea:focus,
select:focus{
  outline:none;
  border-color:var(--sage);
  box-shadow:0 0 0 3px rgba(127,144,113,.1);
}

.email-preview{
  background:white;
  border:1px solid #e7dfd6;
  border-radius:12px;
  padding:72px;
}

.entry{
  border-top:1px solid #ece6de;
  padding:22px 0;
}

.thumb{
  width:110px;
  height:86px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid #e7dfd6;
  flex-shrink:0;
}

.action-btn{
  border-radius:10px;
  transition:.2s ease;
}

.action-btn:hover{
  transform:translateY(-1px);
}

.small-label{
  letter-spacing:.08em;
  text-transform:uppercase;
  font-size:12px;
  color:#6d655f;
  font-weight:600;
}

.edit-btn{
  font-size:12px;
  padding:6px 10px;
  border-radius:6px;
  background:#efebe5;
}

.edit-btn:hover{
  background:#e5ddd3;
}

.delete-btn{
  font-size:12px;
  padding:6px 10px;
  border-radius:6px;
  background:#f4e1de;
}

.delete-btn:hover{
  background:#ebd1cd;
}

.section-title{
  font-size:18px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--sage);
  font-weight:500;
}

.section-line{
  border-top:1px solid #cdbfae;
}

textarea{
  resize:vertical;
}

</style>
</head>

<body class="min-h-screen px-8 py-10">

<div class="max-w-[1600px] mx-auto grid grid-cols-1 xl:grid-cols-[420px_1fr] gap-10">

  <!-- LEFT PANEL -->
  <div>

    <!-- HEADER -->
    <div class="mb-10">

      <img
        id="sidebarLogo"
        src=""
        class="w-[290px] mb-5 hidden"
      />

      <h1 class="serif text-7xl leading-none mb-4">
        kiln<span class="mx-3">|</span>TECH.
      </h1>

      <div class="tracking-[0.25em] uppercase text-sm text-[#7b736c]">
        Daily Update Generator
      </div>

    </div>

    <!-- FORM -->
    <div class="bg-[#f8f5f1] border border-[#e7dfd6] rounded-xl p-8">

      <!-- LOGO -->
      <div class="mb-8">

        <div class="small-label mb-3">
          1. Logo
        </div>

        <label class="border border-dashed border-[#d7cdc1] rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-[#f2ede7] transition">

          <div class="text-2xl mb-2">
            ↑
          </div>

          <div class="font-medium mb-1">
            Upload Logo
          </div>

          <div class="text-sm text-[#7d746c]">
            PNG or JPG
          </div>

          <input type="file" id="logoInput" accept="image/*" class="hidden">

        </label>

      </div>

      <!-- DATE -->
      <div class="mb-8">

        <div class="small-label mb-3">
          2. Date
        </div>

        <input
          id="dateInput"
          type="text"
          class="w-full bg-white border border-[#ddd4ca] rounded-xl px-5 py-4 text-[15px]"
        />

      </div>

      <!-- INTRO -->
      <div class="mb-8">

        <div class="small-label mb-3">
          3. Intro
        </div>

        <textarea
          id="introInput"
          rows="3"
          class="w-full bg-white border border-[#ddd4ca] rounded-xl px-5 py-4 text-[15px]"
        >Hola a todos,</textarea>

      </div>

      <div class="border-t border-[#ddd4ca] my-8"></div>

      <!-- ENTRY -->
      <div>

        <div class="small-label mb-5">
          4. Add Entry
        </div>

        <div class="space-y-5">

          <div>
            <div class="small-label mb-2">Section</div>

            <select
              id="sectionInput"
              class="w-full bg-white border border-[#ddd4ca] rounded-xl px-5 py-4 text-[15px]"
            >
              <option>Completed</option>
              <option>In Progress</option>
              <option>Notes</option>
            </select>
          </div>

          <div>
            <div class="small-label mb-2">Title</div>

            <input
              id="titleInput"
              type="text"
              placeholder="Entry title"
              class="w-full bg-white border border-[#ddd4ca] rounded-xl px-5 py-4 text-[15px]"
            />
          </div>

          <div>
            <div class="small-label mb-2">Description</div>

            <textarea
              id="descriptionInput"
              rows="4"
              placeholder="Brief explanation..."
              class="w-full bg-white border border-[#ddd4ca] rounded-xl px-5 py-4 text-[15px]"
            ></textarea>
          </div>

          <div>
            <div class="small-label mb-2">
              Link Text (optional)
            </div>

            <input
              id="buttonTextInput"
              type="text"
              placeholder="View more"
              class="w-full bg-white border border-[#ddd4ca] rounded-xl px-5 py-4 text-[15px]"
            />
          </div>

          <div>
            <div class="small-label mb-2">
              Link URL (optional)
            </div>

            <input
              id="buttonLinkInput"
              type="text"
              placeholder="https://example.com"
              class="w-full bg-white border border-[#ddd4ca] rounded-xl px-5 py-4 text-[15px]"
            />
          </div>

          <!-- IMAGE -->
          <div>

            <div class="small-label mb-2">
              Image (optional)
            </div>

            <label class="bg-[#edf1e7] border border-[#d7dfcc] rounded-xl p-7 flex flex-col items-center justify-center cursor-pointer hover:bg-[#e7ecdf] transition">

              <div class="text-2xl text-[#748367] mb-2">
                ↑
              </div>

              <div class="font-medium text-[#4d5944] mb-1">
                Upload Image
              </div>

              <div class="text-sm text-[#76806e]">
                JPG or PNG
              </div>

              <input type="file" id="imageInput" accept="image/*" class="hidden">

            </label>

          </div>

          <!-- BUTTONS -->
          <div class="flex gap-4 pt-2">

            <button
              id="addEntryBtn"
              class="flex-1 bg-[#7f9071] hover:bg-[#738266] text-white py-4 rounded-xl action-btn text-[15px] font-medium"
            >
              + Add Entry
            </button>

            <button
              id="clearBtn"
              class="px-8 border border-[#ddd4ca] rounded-xl hover:bg-[#f2ede7] transition"
            >
              Clear
            </button>

          </div>

        </div>

      </div>

      <!-- ENTRY LIST -->
      <div id="entryList" class="mt-10 space-y-3"></div>

      <div class="border-t border-[#ddd4ca] my-8"></div>

      <!-- EXPORT -->
      <div>

        <div class="small-label mb-5">
          5. Export
        </div>

        <div class="space-y-4">

          <button
            id="copyBtn"
            class="w-full bg-[#b47c4d] hover:bg-[#a16f46] text-white py-4 rounded-xl action-btn text-[15px] font-medium"
          >
            Copy HTML
          </button>

          <button
            id="downloadBtn"
            class="w-full border border-[#d9c8b7] hover:bg-[#f2ece5] py-4 rounded-xl action-btn text-[15px] font-medium text-[#8c603c]"
          >
            Download HTML
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- PREVIEW -->
  <div>

    <div class="flex items-center justify-center gap-16 mb-6">

      <div class="flex items-center gap-3 border-b-2 border-[#7f9071] pb-3 px-4">
        <span>◉</span>
        <span class="font-medium tracking-wide">PREVIEW</span>
      </div>

      <div class="flex items-center gap-3 opacity-50">
        <span>&lt;/&gt;</span>
        <span class="font-medium tracking-wide">HTML</span>
      </div>

    </div>

    <div class="email-preview max-w-[900px] mx-auto">

      <div id="previewContent"></div>

    </div>

    <div class="text-center mt-7 text-[#7d746c] text-[15px]">
      Designed for clean updates. Built for builders.
    </div>

  </div>

</div>

<script>

let entries = [];
let editingIndex = null;
let logoData = "";

const previewContent = document.getElementById("previewContent");

const logoInput = document.getElementById("logoInput");
const dateInput = document.getElementById("dateInput");
const introInput = document.getElementById("introInput");

const sectionInput = document.getElementById("sectionInput");
const titleInput = document.getElementById("titleInput");
const descriptionInput = document.getElementById("descriptionInput");
const buttonTextInput = document.getElementById("buttonTextInput");
const buttonLinkInput = document.getElementById("buttonLinkInput");
const imageInput = document.getElementById("imageInput");

function formattedDate(){

  const options = {
    weekday:'short',
    month:'short',
    day:'numeric'
  };

  return new Date().toLocaleDateString('en-US',options);

}

dateInput.value = formattedDate();

logoInput.addEventListener("change",e=>{

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){

    logoData = event.target.result;

    document.getElementById("sidebarLogo").src = logoData;
    document.getElementById("sidebarLogo").classList.remove("hidden");

    renderPreview();

  };

  reader.readAsDataURL(file);

});

function compressImage(file, callback){

  const reader = new FileReader();

  reader.onload = function(event){

    const img = new Image();

    img.onload = function(){

      const canvas = document.createElement("canvas");

      const maxWidth = 700;

      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      const compressed = canvas.toDataURL("image/jpeg",0.72);

      callback(compressed);

    };

    img.src = event.target.result;

  };

  reader.readAsDataURL(file);

}

document.getElementById("addEntryBtn").addEventListener("click",()=>{

  const saveEntry = (imageData="") => {

    const entry = {
      section:sectionInput.value,
      title:titleInput.value,
      description:descriptionInput.value,
      buttonText:buttonTextInput.value,
      buttonLink:buttonLinkInput.value,
      image:imageData
    };

    if(editingIndex !== null){

      entries[editingIndex] = entry;
      editingIndex = null;

      document.getElementById("addEntryBtn").innerText = "+ Add Entry";

    } else {

      entries.push(entry);

    }

    clearForm();
    renderEntryList();
    renderPreview();

  };

  const file = imageInput.files[0];

  if(file){

    compressImage(file,saveEntry);

  } else {

    saveEntry();

  }

});

function clearForm(){

  sectionInput.value = "Completed";
  titleInput.value = "";
  descriptionInput.value = "";
  buttonTextInput.value = "";
  buttonLinkInput.value = "";
  imageInput.value = "";

}

document.getElementById("clearBtn").addEventListener("click",clearForm);

function renderEntryList(){

  const container = document.getElementById("entryList");

  container.innerHTML = "";

  entries.forEach((entry,index)=>{

    const div = document.createElement("div");

    div.className = "bg-white border border-[#e7dfd6] rounded-xl p-4";

    div.innerHTML = `
      <div class="flex items-start justify-between gap-4">

        <div>

          <div class="font-medium text-[15px] mb-1">
            ${entry.title}
          </div>

          <div class="text-[13px] text-[#7d746c]">
            ${entry.section}
          </div>

        </div>

        <div class="flex gap-2">

          <button class="edit-btn" onclick="editEntry(${index})">
            Edit
          </button>

          <button class="delete-btn" onclick="deleteEntry(${index})">
            Delete
          </button>

        </div>

      </div>
    `;

    container.appendChild(div);

  });

}

window.editEntry = function(index){

  const entry = entries[index];

  sectionInput.value = entry.section;
  titleInput.value = entry.title;
  descriptionInput.value = entry.description;
  buttonTextInput.value = entry.buttonText;
  buttonLinkInput.value = entry.buttonLink;

  editingIndex = index;

  document.getElementById("addEntryBtn").innerText = "Save Changes";

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

window.deleteEntry = function(index){

  entries.splice(index,1);

  renderEntryList();
  renderPreview();

}

function renderSection(section){

  const filtered = entries.filter(e=>e.section===section);

  if(!filtered.length) return "";

  return `
    <div style="margin-top:52px;">

      <div style="
        font-size:18px;
        letter-spacing:.12em;
        text-transform:uppercase;
        color:#7f9071;
        font-weight:500;
        margin-bottom:12px;
      ">
        ${section}
      </div>

      <div style="
        border-top:1px solid #cdbfae;
        margin-bottom:8px;
      "></div>

      ${filtered.map(entry=>`

        <div style="
          border-top:1px solid #ece6de;
          padding:22px 0;
          display:flex;
          gap:24px;
          justify-content:space-between;
          align-items:flex-start;
        ">

          <div style="flex:1;min-width:0;">

            <div style="
              font-size:18px;
              line-height:1.4;
              margin-bottom:8px;
              font-family:Georgia,serif;
            ">
              ${entry.title}
            </div>

            <div style="
              font-size:14px;
              line-height:1.8;
              color:#5f5751;
            ">
              ${entry.description}
            </div>

            ${
              entry.buttonText && entry.buttonLink
              ? `
                <a
                  href="${entry.buttonLink}"
                  style="
                    display:inline-block;
                    margin-top:10px;
                    color:#9b6d46;
                    text-decoration:none;
                    font-size:14px;
                    font-weight:500;
                  "
                >
                  ${entry.buttonText} →
                </a>
              `
              : ""
            }

          </div>

          ${
            entry.image
            ? `
              <img
                src="${entry.image}"
                style="
                  width:110px;
                  height:86px;
                  object-fit:cover;
                  border-radius:8px;
                  border:1px solid #e7dfd6;
                  flex-shrink:0;
                "
              />
            `
            : ""
          }

        </div>

      `).join("")}

    </div>
  `;

}

function renderPreview(){

  previewContent.innerHTML = `

    ${
      logoData
      ? `
        <img
          src="${logoData}"
          style="
            width:310px;
            margin-bottom:48px;
          "
        />
      `
      : `
        <div style="
          font-size:72px;
          font-family:'Georgia',serif;
          margin-bottom:48px;
          line-height:1;
        ">
          kiln | TECH.
        </div>
      `
    }

    <div style="
      font-size:18px;
      color:#7f9071;
      font-family:Georgia,serif;
      margin-bottom:38px;
    ">
      ${dateInput.value}
    </div>

    <div style="
      font-size:16px;
      line-height:1.8;
      margin-bottom:42px;
    ">
      ${introInput.value}
    </div>

    ${renderSection("Completed")}
    ${renderSection("In Progress")}
    ${renderSection("Notes")}

    <div style="
      margin-top:60px;
      line-height:1.9;
      font-size:16px;
      color:#4b433d;
    ">
      Gracias,<br><br>
      <span style="font-style:italic;">– Porter</span>
    </div>

  `;

}

renderPreview();

document.getElementById("copyBtn").addEventListener("click",()=>{

  const html = `
<!DOCTYPE html>
<html>
<body style="background:#f6f1ea;padding:40px;font-family:Arial,sans-serif;">
<div style="max-width:900px;margin:auto;background:white;padding:72px;border-radius:12px;">
${previewContent.innerHTML}
</div>
</body>
</html>
`;

  navigator.clipboard.writeText(html);

  alert("HTML copied to clipboard.");

});

document.getElementById("downloadBtn").addEventListener("click",()=>{

  const html = `
<!DOCTYPE html>
<html>
<body style="background:#f6f1ea;padding:40px;font-family:Arial,sans-serif;">
<div style="max-width:900px;margin:auto;background:white;padding:72px;border-radius:12px;">
${previewContent.innerHTML}
</div>
</body>
</html>
`;

  const blob = new Blob([html],{type:"text/html"});

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download = "kiln-tech-update.html";

  a.click();

});

</script>

</body>
</html>
