<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kiln Tech Daily Update Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --outer:#e9ddd0;
  --card:#fcfaf7;
  --sage:#7d8e71;
  --sage-light:#e5eadf;
  --brown:#a56f45;
  --text:#2c2926;
  --muted:#766d65;
  --line:#ddd2c5;
}

body{
  background:var(--outer);
  color:var(--text);
  font-family:'Inter',sans-serif;
}

.serif{
  font-family:'Cormorant Garamond',serif;
}

input,
textarea,
select{
  transition:.2s ease;
}

input:focus,
textarea:focus,
select:focus{
  outline:none;
  border-color:var(--sage);
  box-shadow:0 0 0 3px rgba(125,142,113,.08);
}

textarea{
  resize:vertical;
}

.email-preview{
  background:var(--card);
  border:1px solid #ddd2c5;
  border-radius:12px;
  padding:52px;
}

.small-label{
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:#726962;
  font-weight:600;
}

.action-btn{
  transition:.2s ease;
}

.action-btn:hover{
  transform:translateY(-1px);
}

.edit-btn{
  font-size:11px;
  padding:5px 9px;
  border-radius:6px;
  background:#ece7e0;
}

.edit-btn:hover{
  background:#dfd7cd;
}

.delete-btn{
  font-size:11px;
  padding:5px 9px;
  border-radius:6px;
  background:#f1dfdb;
}

.delete-btn:hover{
  background:#e6cbc5;
}

</style>
</head>

<body class="min-h-screen px-6 py-7">

<div class="max-w-[1500px] mx-auto grid grid-cols-1 xl:grid-cols-[360px_1fr] gap-8">

  <!-- LEFT PANEL -->
  <div>

    <!-- HEADER -->
    <div class="mb-7">

      <img
        id="sidebarLogo"
        src=""
        class="w-[230px] mb-4 hidden"
      />

      <h1 class="serif text-6xl leading-none mb-3">
        kiln<span class="mx-2">|</span>TECH.
      </h1>

      <div class="tracking-[0.22em] uppercase text-[11px] text-[#766d65]">
        Daily Update Generator
      </div>

    </div>

    <!-- PANEL -->
    <div class="bg-[#f7f3ee] border border-[#ddd2c5] rounded-xl p-6">

      <!-- LOGO -->
      <div class="mb-6">

        <div class="small-label mb-2">
          Logo
        </div>

        <label class="border border-dashed border-[#d7cdc1] rounded-xl p-5 flex flex-col items-center justify-center cursor-pointer hover:bg-[#f1ece6] transition">

          <div class="text-xl mb-1">
            ↑
          </div>

          <div class="font-medium text-sm mb-1">
            Upload Logo
          </div>

          <div class="text-xs text-[#7d746c]">
            PNG or JPG
          </div>

          <input type="file" id="logoInput" accept="image/*" class="hidden">

        </label>

      </div>

      <!-- DATE -->
      <div class="mb-5">

        <div class="small-label mb-2">
          Date
        </div>

        <input
          id="dateInput"
          type="text"
          class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-3 text-[14px]"
        />

      </div>

      <!-- INTRO -->
      <div class="mb-6">

        <div class="small-label mb-2">
          Intro
        </div>

        <textarea
          id="introInput"
          rows="2"
          class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-3 text-[14px]"
        >Hola a todos,</textarea>

      </div>

      <div class="border-t border-[#ddd2c5] my-6"></div>

      <!-- ENTRY -->
      <div>

        <div class="small-label mb-4">
          Add Entry
        </div>

        <div class="space-y-4">

          <select
            id="sectionInput"
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-3 text-[14px]"
          >
            <option>Completed</option>
            <option>In Progress</option>
            <option>Notes</option>
          </select>

          <input
            id="titleInput"
            type="text"
            placeholder="Entry title"
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-3 text-[14px]"
          />

          <textarea
            id="descriptionInput"
            rows="3"
            placeholder="Brief explanation..."
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-3 text-[14px]"
          ></textarea>

          <input
            id="buttonTextInput"
            type="text"
            placeholder="Link text"
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-3 text-[14px]"
          />

          <input
            id="buttonLinkInput"
            type="text"
            placeholder="Link URL"
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-3 text-[14px]"
          />

          <!-- IMAGE -->
          <label class="bg-[#edf1e7] border border-[#d8dfd0] rounded-xl p-5 flex flex-col items-center justify-center cursor-pointer hover:bg-[#e5eadf] transition">

            <div class="text-xl text-[#748367] mb-1">
              ↑
            </div>

            <div class="font-medium text-sm text-[#4d5944] mb-1">
              Upload Image
            </div>

            <div class="text-xs text-[#76806e]">
              JPG or PNG
            </div>

            <input type="file" id="imageInput" accept="image/*" class="hidden">

          </label>

          <!-- BUTTONS -->
          <div class="flex gap-3 pt-1">

            <button
              id="addEntryBtn"
              class="flex-1 bg-[#7d8e71] hover:bg-[#708063] text-white py-3 rounded-xl action-btn text-[14px] font-medium"
            >
              + Add Entry
            </button>

            <button
              id="clearBtn"
              class="px-5 border border-[#ddd2c5] rounded-xl hover:bg-[#f1ece6] transition text-[14px]"
            >
              Clear
            </button>

          </div>

        </div>

      </div>

      <!-- ENTRY LIST -->
      <div id="entryList" class="mt-7 space-y-2"></div>

      <div class="border-t border-[#ddd2c5] my-6"></div>

      <!-- EXPORT -->
      <div>

        <div class="small-label mb-4">
          Export
        </div>

        <div class="space-y-3">

          <button
            id="copyBtn"
            class="w-full bg-[#a56f45] hover:bg-[#94613b] text-white py-3 rounded-xl action-btn text-[14px] font-medium"
          >
            Copy HTML
          </button>

          <button
            id="downloadBtn"
            class="w-full border border-[#d8c7b7] hover:bg-[#f2ece5] py-3 rounded-xl action-btn text-[14px] font-medium text-[#8c603c]"
          >
            Download HTML
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- PREVIEW -->
  <div>

    <div class="flex items-center justify-center gap-12 mb-5">

      <div class="flex items-center gap-3 border-b-2 border-[#7d8e71] pb-2 px-4">
        <span>◉</span>
        <span class="font-medium tracking-wide text-sm">PREVIEW</span>
      </div>

      <div class="flex items-center gap-3 opacity-40">
        <span>&lt;/&gt;</span>
        <span class="font-medium tracking-wide text-sm">HTML</span>
      </div>

    </div>

    <div class="email-preview max-w-[860px] mx-auto">

      <div id="previewContent"></div>

    </div>

  </div>

</div>

<script>

let entries = [];
let editingIndex = null;
let logoData = "";

const previewContent = document.getElementById("previewContent");

const logoInput = document.getElementById("logoInput");
const dateInput = document.getElementById("dateInput");
const introInput = document.getElementById("introInput");

const sectionInput = document.getElementById("sectionInput");
const titleInput = document.getElementById("titleInput");
const descriptionInput = document.getElementById("descriptionInput");
const buttonTextInput = document.getElementById("buttonTextInput");
const buttonLinkInput = document.getElementById("buttonLinkInput");
const imageInput = document.getElementById("imageInput");

function formattedDate(){

  const options = {
    weekday:'short',
    month:'short',
    day:'numeric'
  };

  return new Date().toLocaleDateString('en-US',options);

}

dateInput.value = formattedDate();

logoInput.addEventListener("change",e=>{

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){

    logoData = event.target.result;

    document.getElementById("sidebarLogo").src = logoData;
    document.getElementById("sidebarLogo").classList.remove("hidden");

    renderPreview();

  };

  reader.readAsDataURL(file);

});

function compressImage(file, callback){

  const reader = new FileReader();

  reader.onload = function(event){

    const img = new Image();

    img.onload = function(){

      const canvas = document.createElement("canvas");

      const maxWidth = 700;

      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      const compressed = canvas.toDataURL("image/jpeg",0.72);

      callback(compressed);

    };

    img.src = event.target.result;

  };

  reader.readAsDataURL(file);

}

document.getElementById("addEntryBtn").addEventListener("click",()=>{

  const saveEntry = (imageData="") => {

    const entry = {
      section:sectionInput.value,
      title:titleInput.value,
      description:descriptionInput.value,
      buttonText:buttonTextInput.value,
      buttonLink:buttonLinkInput.value,
      image:imageData
    };

    if(editingIndex !== null){

      entries[editingIndex] = entry;
      editingIndex = null;

      document.getElementById("addEntryBtn").innerText = "+ Add Entry";

    } else {

      entries.push(entry);

    }

    clearForm();
    renderEntryList();
    renderPreview();

  };

  const file = imageInput.files[0];

  if(file){

    compressImage(file,saveEntry);

  } else {

    saveEntry();

  }

});

function clearForm(){

  sectionInput.value = "Completed";
  titleInput.value = "";
  descriptionInput.value = "";
  buttonTextInput.value = "";
  buttonLinkInput.value = "";
  imageInput.value = "";

}

document.getElementById("clearBtn").addEventListener("click",clearForm);

function renderEntryList(){

  const container = document.getElementById("entryList");

  container.innerHTML = "";

  entries.forEach((entry,index)=>{

    const div = document.createElement("div");

    div.className = "bg-white border border-[#e7dfd6] rounded-xl p-3";

    div.innerHTML = `
      <div class="flex items-start justify-between gap-3">

        <div>

          <div class="font-medium text-[14px] mb-1">
            ${entry.title}
          </div>

          <div class="text-[12px] text-[#7d746c]">
            ${entry.section}
          </div>

        </div>

        <div class="flex gap-2">

          <button class="edit-btn" onclick="editEntry(${index})">
            Edit
          </button>

          <button class="delete-btn" onclick="deleteEntry(${index})">
            Delete
          </button>

        </div>

      </div>
    `;

    container.appendChild(div);

  });

}

window.editEntry = function(index){

  const entry = entries[index];

  sectionInput.value = entry.section;
  titleInput.value = entry.title;
  descriptionInput.value = entry.description;
  buttonTextInput.value = entry.buttonText;
  buttonLinkInput.value = entry.buttonLink;

  editingIndex = index;

  document.getElementById("addEntryBtn").innerText = "Save Changes";

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

window.deleteEntry = function(index){

  entries.splice(index,1);

  renderEntryList();
  renderPreview();

}

function renderSection(section){

  const filtered = entries.filter(e=>e.section===section);

  if(!filtered.length) return "";

  return `
    <div style="margin-top:34px;">

      <div style="
        font-size:15px;
        letter-spacing:.12em;
        text-transform:uppercase;
        color:#7d8e71;
        font-weight:600;
        margin-bottom:10px;
      ">
        ${section}
      </div>

      <div style="
        border-top:1px solid #cdbfae;
        margin-bottom:4px;
      "></div>

      ${filtered.map(entry=>`

        <div style="
          border-top:1px solid #ece6de;
          padding:14px 0;
          display:flex;
          gap:18px;
          justify-content:space-between;
          align-items:flex-start;
        ">

          <div style="flex:1;min-width:0;">

            <div style="
              font-size:17px;
              line-height:1.35;
              margin-bottom:5px;
              font-family:Georgia,serif;
            ">
              ${entry.title}
            </div>

            <div style="
              font-size:14px;
              line-height:1.55;
              color:#5f5751;
            ">
              ${entry.description}
            </div>

            ${
              entry.buttonText && entry.buttonLink
              ? `
                <a
                  href="${entry.buttonLink}"
                  style="
                    display:inline-block;
                    margin-top:8px;
                    color:#9b6d46;
                    text-decoration:none;
                    font-size:13px;
                    font-weight:500;
                  "
                >
                  ${entry.buttonText} →
                </a>
              `
              : ""
            }

          </div>

          ${
            entry.image
            ? `
              <img
                src="${entry.image}"
                style="
                  width:95px;
                  height:74px;
                  object-fit:cover;
                  border-radius:7px;
                  border:1px solid #e7dfd6;
                  flex-shrink:0;
                "
              />
            `
            : ""
          }

        </div>

      `).join("")}

    </div>
  `;

}

function renderPreview(){

  previewContent.innerHTML = `

    ${
      logoData
      ? `
        <img
          src="${logoData}"
          style="
            width:270px;
            margin-bottom:32px;
          "
        />
      `
      : `
        <div style="
          font-size:62px;
          font-family:'Georgia',serif;
          margin-bottom:32px;
          line-height:1;
        ">
          kiln | TECH.
        </div>
      `
    }

    <div style="
      font-size:17px;
      color:#7d8e71;
      font-family:Georgia,serif;
      margin-bottom:24px;
    ">
      ${dateInput.value}
    </div>

    <div style="
      font-size:15px;
      line-height:1.7;
      margin-bottom:28px;
    ">
      ${introInput.value}
    </div>

    ${renderSection("Completed")}
    ${renderSection("In Progress")}
    ${renderSection("Notes")}

    <div style="
      margin-top:38px;
      line-height:1.8;
      font-size:15px;
      color:#4b433d;
    ">
      Gracias,<br><br>
      <span style="font-style:italic;">– Porter</span>
    </div>

  `;

}

renderPreview();

document.getElementById("copyBtn").addEventListener("click",()=>{

  const html = `
<!DOCTYPE html>
<html>
<body style="background:#e9ddd0;padding:32px;font-family:Arial,sans-serif;">
<div style="max-width:860px;margin:auto;background:#fcfaf7;padding:52px;border-radius:12px;">
${previewContent.innerHTML}
</div>
</body>
</html>
`;

  navigator.clipboard.writeText(html);

  alert("HTML copied to clipboard.");

});

document.getElementById("downloadBtn").addEventListener("click",()=>{

  const html = `
<!DOCTYPE html>
<html>
<body style="background:#e9ddd0;padding:32px;font-family:Arial,sans-serif;">
<div style="max-width:860px;margin:auto;background:#fcfaf7;padding:52px;border-radius:12px;">
${previewContent.innerHTML}
</div>
</body>
</html>
`;

  const blob = new Blob([html],{type:"text/html"});

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download = "kiln-tech-update.html";

  a.click();

});

</script>

</body>
</html>
