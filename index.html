<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kiln Tech Daily Update Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --outer:#e9ddd0;
  --card:#fcfaf7;
  --sage:#7d8e71;
  --brown:#a56f45;
  --text:#2c2926;
  --muted:#766d65;
  --line:#ddd2c5;
}

body{
  background:var(--outer);
  color:var(--text);
  font-family:'Inter',sans-serif;
}

.serif{
  font-family:'Cormorant Garamond',serif;
}

input,
textarea,
select{
  transition:.18s ease;
}

input:focus,
textarea:focus,
select:focus{
  outline:none;
  border-color:var(--sage);
  box-shadow:0 0 0 3px rgba(125,142,113,.08);
}

textarea{
  resize:vertical;
}

.email-preview{
  background:var(--card);
  border:1px solid #ddd2c5;
  border-radius:12px;
  padding:40px;
}

.small-label{
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#726962;
  font-weight:600;
}

.action-btn{
  transition:.18s ease;
}

.action-btn:hover{
  transform:translateY(-1px);
  opacity:.92;
}

.edit-btn{
  font-size:11px;
  padding:5px 9px;
  border-radius:6px;
  background:#ece7e0;
}

.edit-btn:hover{
  background:#dfd7cd;
}

.delete-btn{
  font-size:11px;
  padding:5px 9px;
  border-radius:6px;
  background:#f1dfdb;
}

.delete-btn:hover{
  background:#e6cbc5;
}

</style>
</head>

<body class="min-h-screen px-5 py-5">

<div class="max-w-[1450px] mx-auto grid grid-cols-1 xl:grid-cols-[340px_1fr] gap-7">

  <!-- LEFT PANEL -->
  <div>

    <div class="mb-5">

      <h1 class="serif text-5xl leading-none mb-2">
        kiln<span class="mx-2">|</span>TECH.
      </h1>

      <div class="tracking-[0.22em] uppercase text-[10px] text-[#766d65]">
        Daily Update Generator
      </div>

    </div>

    <div class="bg-[#f7f3ee] border border-[#ddd2c5] rounded-xl p-5">

      <!-- DATE -->
      <div class="mb-4">

        <div class="small-label mb-2">
          Date
        </div>

        <input
          id="dateInput"
          type="text"
          class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-2.5 text-[13px]"
        />

      </div>

      <!-- INTRO -->
      <div class="mb-5">

        <div class="small-label mb-2">
          Intro
        </div>

        <textarea
          id="introInput"
          rows="2"
          class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-2.5 text-[13px]"
        >Hola a todos,</textarea>

      </div>

      <div class="border-t border-[#ddd2c5] my-5"></div>

      <!-- ENTRY -->
      <div>

        <div class="small-label mb-3">
          Add Entry
        </div>

        <div class="space-y-3">

          <select
            id="sectionInput"
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-2.5 text-[13px]"
          >
            <option>Completed</option>
            <option>In Progress</option>
            <option>Notes</option>
          </select>

          <input
            id="titleInput"
            type="text"
            placeholder="Entry title"
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-2.5 text-[13px]"
          />

          <textarea
            id="descriptionInput"
            rows="3"
            placeholder="Brief explanation..."
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-2.5 text-[13px]"
          ></textarea>

          <input
            id="buttonTextInput"
            type="text"
            placeholder="Link text"
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-2.5 text-[13px]"
          />

          <input
            id="buttonLinkInput"
            type="text"
            placeholder="Link URL"
            class="w-full bg-white border border-[#ddd2c5] rounded-xl px-4 py-2.5 text-[13px]"
          />

          <!-- BUTTONS -->
          <div class="flex gap-3 pt-1">

            <button
              id="addEntryBtn"
              class="flex-1 bg-[#7d8e71] hover:bg-[#708063] text-white py-2.5 rounded-xl action-btn text-[13px] font-medium"
            >
              + Add Entry
            </button>

            <button
              id="clearBtn"
              class="px-5 border border-[#ddd2c5] rounded-xl hover:bg-[#f1ece6] transition text-[13px]"
            >
              Clear
            </button>

          </div>

        </div>

      </div>

      <!-- ENTRY LIST -->
      <div id="entryList" class="mt-5 space-y-2"></div>

      <div class="border-t border-[#ddd2c5] my-5"></div>

      <!-- EXPORT -->
      <div>

        <div class="small-label mb-3">
          Export
        </div>

        <div class="space-y-2.5">

          <button
            id="copyBtn"
            class="w-full bg-[#a56f45] hover:bg-[#94613b] text-white py-2.5 rounded-xl action-btn text-[13px] font-medium"
          >
            Copy HTML
          </button>

          <button
            id="downloadBtn"
            class="w-full border border-[#d8c7b7] hover:bg-[#f2ece5] py-2.5 rounded-xl action-btn text-[13px] font-medium text-[#8c603c]"
          >
            Download HTML
          </button>

          <button
            id="clearDraftBtn"
            class="w-full border border-[#e0d3c7] hover:bg-[#f3ebe3] py-2.5 rounded-xl text-[13px]"
          >
            Clear Draft
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- PREVIEW -->
  <div>

    <div class="flex items-center justify-center gap-12 mb-4">

      <div class="flex items-center gap-3 border-b-2 border-[#7d8e71] pb-2 px-4">
        <span>◉</span>
        <span class="font-medium tracking-wide text-xs">PREVIEW</span>
      </div>

    </div>

    <div class="email-preview max-w-[980px] mx-auto">

      <div id="previewContent"></div>

    </div>

  </div>

</div>

<script>

let entries = [];
let editingIndex = null;

const previewContent = document.getElementById("previewContent");

const dateInput = document.getElementById("dateInput");
const introInput = document.getElementById("introInput");

const sectionInput = document.getElementById("sectionInput");
const titleInput = document.getElementById("titleInput");
const descriptionInput = document.getElementById("descriptionInput");
const buttonTextInput = document.getElementById("buttonTextInput");
const buttonLinkInput = document.getElementById("buttonLinkInput");

function formattedDate(){

  const options = {
    weekday:'short',
    month:'short',
    day:'numeric'
  };

  return new Date().toLocaleDateString('en-US',options);

}

function saveDraft(){

  localStorage.setItem("kilnDraft", JSON.stringify({
    entries,
    date: dateInput.value,
    intro: introInput.value
  }));

}

function loadDraft(){

  const saved = localStorage.getItem("kilnDraft");

  if(!saved) return;

  const draft = JSON.parse(saved);

  entries = draft.entries || [];

  dateInput.value = draft.date || formattedDate();
  introInput.value = draft.intro || "Hola a todos,";

  renderEntryList();

}

function formatTitle(title){

  return title.replace(
    /#(\d+)/g,
    `<span style="
      display:inline-block;
      background:#efe7dc;
      color:#7b6857;
      border-radius:999px;
      padding:1px 7px;
      font-size:11px;
      font-family:Inter,sans-serif;
      margin-right:5px;
      vertical-align:middle;
    ">#$1</span>`
  );

}

function renderStats(){

  const completed = entries.filter(e=>e.section==="Completed").length;
  const progress = entries.filter(e=>e.section==="In Progress").length;
  const notes = entries.filter(e=>e.section==="Notes").length;

  return `
    <div style="
      display:flex;
      gap:7px;
      margin-bottom:12px;
      flex-wrap:wrap;
    ">

      <div style="
        background:#edf1e7;
        color:#617053;
        padding:4px 9px;
        border-radius:999px;
        font-size:10px;
        font-weight:600;
      ">
        ${completed} Completed
      </div>

      <div style="
        background:#efe7dc;
        color:#7c6754;
        padding:4px 9px;
        border-radius:999px;
        font-size:10px;
        font-weight:600;
      ">
        ${progress} In Progress
      </div>

      <div style="
        background:#f3e8e4;
        color:#8b6358;
        padding:4px 9px;
        border-radius:999px;
        font-size:10px;
        font-weight:600;
      ">
        ${notes} Notes
      </div>

    </div>
  `;

}

function renderCard(entry, bg, border){

  return `
    <div style="
      background:${bg};
      border:1px solid ${border};
      border-radius:9px;
      padding:11px 13px;
    ">

      <div style="
        font-size:14px;
        line-height:1.25;
        margin-bottom:3px;
        font-family:Georgia,serif;
      ">
        ${formatTitle(entry.title)}
      </div>

      <div style="
        font-size:12px;
        line-height:1.42;
        color:#5f5751;
      ">
        ${entry.description}
      </div>

      ${
        entry.buttonText && entry.buttonLink
        ? `
          <a
            href="${entry.buttonLink}"
            style="
              display:inline-block;
              margin-top:5px;
              color:#9b6d46;
              text-decoration:none;
              font-size:11px;
              font-weight:500;
            "
          >
            ${entry.buttonText} ↗
          </a>
        `
        : ""
      }

    </div>
  `;

}

function renderSection(section){

  const filtered = entries.filter(e=>e.section===section);

  if(!filtered.length) return "";

  let bg = "#f9f6f2";
  let border = "#e7ddd2";

  if(section === "Completed"){
    bg = "#eef3ea";
    border = "#d7e1cf";
  }

  if(section === "In Progress"){
    bg = "#f4ede4";
    border = "#e5d7c7";
  }

  if(section === "Notes"){
    bg = "#f3e8e4";
    border = "#e2d0ca";
  }

  const isNotes = section === "Notes";

  if(isNotes){

    return `
      <div style="margin-top:14px;">

        <div style="
          font-size:12px;
          letter-spacing:.14em;
          text-transform:uppercase;
          color:#7d8e71;
          font-weight:600;
          margin-bottom:6px;
        ">
          ${section}
        </div>

        ${filtered.map(entry=>`

          <div style="
            background:${bg};
            border:1px solid ${border};
            border-radius:9px;
            padding:11px 13px;
            margin-top:7px;
          ">

            <div style="
              font-size:14px;
              line-height:1.25;
              margin-bottom:3px;
              font-family:Georgia,serif;
            ">
              ${formatTitle(entry.title)}
            </div>

            <div style="
              font-size:12px;
              line-height:1.42;
              color:#5f5751;
            ">
              ${entry.description}
            </div>

            ${
              entry.buttonText && entry.buttonLink
              ? `
                <a
                  href="${entry.buttonLink}"
                  style="
                    display:inline-block;
                    margin-top:5px;
                    color:#9b6d46;
                    text-decoration:none;
                    font-size:11px;
                    font-weight:500;
                  "
                >
                  ${entry.buttonText} ↗
                </a>
              `
              : ""
            }

          </div>

        `).join("")}

      </div>
    `;

  }

  let rows = "";

  for(let i = 0; i < filtered.length; i += 2){

    const left = filtered[i];
    const right = filtered[i + 1];

    rows += `
      <tr>

        <td valign="top" width="50%" style="padding:4px;">

          ${renderCard(left, bg, border)}

        </td>

        <td valign="top" width="50%" style="padding:4px;">

          ${
            right
            ? renderCard(right, bg, border)
            : ""
          }

        </td>

      </tr>
    `;

  }

  return `
    <div style="margin-top:14px;">

      <div style="
        font-size:12px;
        letter-spacing:.14em;
        text-transform:uppercase;
        color:#7d8e71;
        font-weight:600;
        margin-bottom:6px;
      ">
        ${section}
      </div>

      <table
        role="presentation"
        width="100%"
        cellspacing="0"
        cellpadding="0"
        border="0"
      >
        ${rows}
      </table>

    </div>
  `;

}

function renderPreview(){

  previewContent.innerHTML = `

    <div style="
      font-size:44px;
      font-family:'Georgia',serif;
      margin-bottom:14px;
      line-height:1;
    ">
      kiln | TECH.
    </div>

    <div style="
      font-size:14px;
      color:#7d8e71;
      font-family:Georgia,serif;
      margin-bottom:10px;
    ">
      ${dateInput.value}
    </div>

    <div style="
      font-size:13px;
      line-height:1.5;
      margin-bottom:10px;
    ">
      ${introInput.value}
    </div>

    ${renderStats()}

    ${renderSection("Completed")}
    ${renderSection("In Progress")}
    ${renderSection("Notes")}

    <div style="
      margin-top:14px;
      line-height:1.45;
      font-size:13px;
      color:#4b433d;
    ">
      Gracias,<br><br>
      <span style="font-style:italic;">– Porter</span>
    </div>

  `;

}

function clearForm(){

  sectionInput.value = "Completed";
  titleInput.value = "";
  descriptionInput.value = "";
  buttonTextInput.value = "";
  buttonLinkInput.value = "";

}

function renderEntryList(){

  const container = document.getElementById("entryList");

  container.innerHTML = "";

  entries.forEach((entry,index)=>{

    const div = document.createElement("div");

    div.className = "bg-white border border-[#e7dfd6] rounded-xl p-2.5";

    div.innerHTML = `
      <div class="flex items-start justify-between gap-3">

        <div>

          <div class="font-medium text-[13px] mb-0.5">
            ${entry.title}
          </div>

          <div class="text-[11px] text-[#7d746c]">
            ${entry.section}
          </div>

        </div>

        <div class="flex gap-2">

          <button class="edit-btn" onclick="editEntry(${index})">
            Edit
          </button>

          <button class="delete-btn" onclick="deleteEntry(${index})">
            Delete
          </button>

        </div>

      </div>
    `;

    container.appendChild(div);

  });

}

window.editEntry = function(index){

  const entry = entries[index];

  sectionInput.value = entry.section;
  titleInput.value = entry.title;
  descriptionInput.value = entry.description;
  buttonTextInput.value = entry.buttonText;
  buttonLinkInput.value = entry.buttonLink;

  editingIndex = index;

  document.getElementById("addEntryBtn").innerText = "Save Changes";

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

window.deleteEntry = function(index){

  entries.splice(index,1);

  renderEntryList();
  renderPreview();
  saveDraft();

}

dateInput.addEventListener("input",()=>{
  renderPreview();
  saveDraft();
});

introInput.addEventListener("input",()=>{
  renderPreview();
  saveDraft();
});

document.getElementById("addEntryBtn").addEventListener("click",()=>{

  const entry = {
    section:sectionInput.value,
    title:titleInput.value,
    description:descriptionInput.value,
    buttonText:buttonTextInput.value,
    buttonLink:buttonLinkInput.value
  };

  if(editingIndex !== null){

    entries[editingIndex] = entry;
    editingIndex = null;

    document.getElementById("addEntryBtn").innerText = "+ Add Entry";

  } else {

    entries.push(entry);

  }

  clearForm();
  renderEntryList();
  renderPreview();
  saveDraft();

});

document.getElementById("clearBtn").addEventListener("click",clearForm);

document.getElementById("copyBtn").addEventListener("click",()=>{

  const html = `
<!DOCTYPE html>
<html>
<body style="background:#e9ddd0;padding:24px;font-family:Arial,sans-serif;">
<div style="max-width:980px;margin:auto;background:#fcfaf7;padding:40px;border-radius:12px;">
${previewContent.innerHTML}
</div>
</body>
</html>
`;

  navigator.clipboard.writeText(html);

  alert("HTML copied to clipboard.");

});

document.getElementById("downloadBtn").addEventListener("click",()=>{

  const html = `
<!DOCTYPE html>
<html>
<body style="background:#e9ddd0;padding:24px;font-family:Arial,sans-serif;">
<div style="max-width:980px;margin:auto;background:#fcfaf7;padding:40px;border-radius:12px;">
${previewContent.innerHTML}
</div>
</body>
</html>
`;

  const blob = new Blob([html],{type:"text/html"});

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download = "kiln-tech-update.html";

  a.click();

});

document.getElementById("clearDraftBtn").addEventListener("click",()=>{

  const confirmed = confirm("Clear saved draft?");

  if(!confirmed) return;

  localStorage.removeItem("kilnDraft");

  location.reload();

});

loadDraft();

if(!dateInput.value){
  dateInput.value = formattedDate();
}

renderPreview();

</script>

</body>
</html>
